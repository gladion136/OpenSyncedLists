<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1080" height="2220" viewBox="0 0 1080 2220" version="1.1"
   id="hero"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#7a1bff" />
      <stop offset="0.55" stop-color="#5f00e8" />
      <stop offset="1" stop-color="#4400a6" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#13c8b6" />
      <stop offset="1" stop-color="#0fb39f" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1080" height="2220" fill="url(#bg)" />

  <!-- Soft decorative blobs -->
  <circle cx="120" cy="180" r="260" fill="#ffffff" opacity="0.05" />
  <circle cx="980" cy="2080" r="340" fill="#13c8b6" opacity="0.12" />
  <path d="M 0 1640 C 240 1560 380 1660 580 1602 C 800 1540 940 1612 1080 1540 V 2220 H 0 Z"
        fill="#ffffff" opacity="0.04" />

  <!-- Logo card -->
  <rect x="392" y="300" width="296" height="296" rx="64" ry="64"
        fill="#ffffff" opacity="0.97" />
  <image x="424" y="332" width="232" height="232"
         xlink:href="__ICON_PATH__" href="__ICON_PATH__"
         preserveAspectRatio="xMidYMid meet" />

  <!-- App name -->
  <text x="540" y="730" text-anchor="middle" fill="#ffffff"
        font-family="Inter, Roboto, Arial, sans-serif"
        font-size="86px" font-weight="800">OpenSyncedLists</text>

  <!-- Tagline -->
  <text x="540" y="828" text-anchor="middle" fill="#d8c9ff"
        font-family="Inter, Roboto, Arial, sans-serif"
        font-size="58px" font-weight="500">__TAGLINE__</text>

  <!-- Benefit rows -->
  <!-- Row 1 -->
  <g transform="translate(150, 1010)">
    <circle cx="44" cy="44" r="44" fill="url(#accent)" />
    <path d="M 24 46 L 38 60 L 66 30" fill="none" stroke="#ffffff" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round" />
    <text x="132" y="38" fill="#ffffff" font-family="Inter, Roboto, Arial, sans-serif"
          font-size="60px" font-weight="700">__B1_TITLE__</text>
    <text x="132" y="98" fill="#d8c9ff" font-family="Inter, Roboto, Arial, sans-serif"
          font-size="44px" font-weight="400">__B1_BODY__</text>
  </g>
  <!-- Row 2 -->
  <g transform="translate(150, 1230)">
    <circle cx="44" cy="44" r="44" fill="url(#accent)" />
    <path d="M 30 30 H 58 M 30 44 H 58 M 30 58 H 58" fill="none" stroke="#ffffff"
          stroke-width="9" stroke-linecap="round" />
    <text x="132" y="38" fill="#ffffff" font-family="Inter, Roboto, Arial, sans-serif"
          font-size="60px" font-weight="700">__B2_TITLE__</text>
    <text x="132" y="98" fill="#d8c9ff" font-family="Inter, Roboto, Arial, sans-serif"
          font-size="44px" font-weight="400">__B2_BODY__</text>
  </g>
  <!-- Row 3 -->
  <g transform="translate(150, 1450)">
    <circle cx="44" cy="44" r="44" fill="url(#accent)" />
    <path d="M 32 40 V 32 C 32 25 37 21 44 21 C 51 21 56 25 56 32 V 40"
          fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" />
    <rect x="26" y="40" width="36" height="28" rx="6" fill="#ffffff" />
    <circle cx="44" cy="52" r="4.5" fill="url(#accent)" />
    <rect x="42" y="54" width="4" height="8" rx="2" fill="url(#accent)" />
    <text x="132" y="38" fill="#ffffff" font-family="Inter, Roboto, Arial, sans-serif"
          font-size="60px" font-weight="700">__B3_TITLE__</text>
    <text x="132" y="98" fill="#d8c9ff" font-family="Inter, Roboto, Arial, sans-serif"
          font-size="44px" font-weight="400">__B3_BODY__</text>
  </g>

  <!-- Bottom trust line -->
  <text x="540" y="1770" text-anchor="middle" fill="#ffffff"
        font-family="Inter, Roboto, Arial, sans-serif"
        font-size="52px" font-weight="600" opacity="0.95">__FOOTER__</text>
  <text x="540" y="1832" text-anchor="middle" fill="#c9b8f7"
        font-family="Inter, Roboto, Arial, sans-serif"
        font-size="42px" font-weight="400">Free &amp; open source</text>
</svg>
