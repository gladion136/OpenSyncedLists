<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OpenSyncedLists</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
        }
        #app {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loading {
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">
            <h2>Loading OpenSyncedLists...</h2>
            <p>Cross-platform synced lists application</p>
        </div>
    </div>
    <script type="module">
        import init, { run_app } from '../pkg/opensyncedlists.js';

        async function main() {
            try {
                await init();
                document.getElementById('app').innerHTML = '';
                run_app();
            } catch (error) {
                console.error('Failed to initialize app:', error);
                document.getElementById('app').innerHTML =
                    '<div class="loading"><h2>Failed to load application</h2><p>' +
                    error.message + '</p></div>';
            }
        }

        main();
    </script>
</body>
</html>
